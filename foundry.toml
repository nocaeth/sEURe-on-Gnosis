[profile.default]
src = 'src'
test = 'test'
script = 'script'
out = 'out'
libs = ['lib']
remappings = []

[rpc_endpoints]
gnosis = "${RPC_GNOSIS}"
chiado = "${RPC_CHIADO}"

[etherscan]
#gnosis={key="${ETHERSCAN_API_KEY_GNOSIS}",chainId=100}

[fuzz]
runs=10000

# Public getters intentionally match interfaces (sEURe, vaultAPY); scripts use deriveKey.
[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "screaming-snake-case-const",
    "asm-keccak256",
    "unsafe-cheatcode",
]
mixed_case_exceptions = ["ERC", "URI", "APY", "EURe", "EOA", "sEURe"]
