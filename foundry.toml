[profile.default]
src = 'src'
test = 'test'
script = 'script'
out = 'out'
libs = ['lib']
remappings = []
# Treat solc warnings as errors for first-party code; OZ may emit future-keyword warnings (e.g. 6335 in ECDSA.sol).
deny = "warnings"
ignored_warnings_from = ["lib"]
solc_version = "0.8.35"
# Gnosis mainnet + Chiado: Pectra (Prague/Electra). Pins bytecode to chain opcodes; avoids drifting with solc defaults (e.g. Osaka from 0.8.31+).
evm_version = "prague"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
gnosis = "${RPC_GNOSIS}"
chiado = "${RPC_CHIADO}"

[etherscan]
#gnosis={key="${ETHERSCAN_API_KEY_GNOSIS}",chainId=100}

[fuzz]
runs=10000

# Public getters intentionally match interfaces (sEURe, vaultAPY); scripts use deriveKey.
[lint]
exclude_lints = []
mixed_case_exceptions = ["ERC", "URI", "APY", "EURe", "EOA", "sEURe"]
